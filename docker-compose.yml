
services:

  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: stockpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockpilot
      POSTGRES_USER: stockpilot
      POSTGRES_PASSWORD: stockpilot123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockpilot -d stockpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ───────────────────────────────────────
  backend:
    build:
      context: ./stockpilot-backend
      dockerfile: Dockerfile
    container_name: stockpilot-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stockpilot
      SPRING_DATASOURCE_USERNAME: stockpilot
      SPRING_DATASOURCE_PASSWORD: stockpilot123
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"

  # ─── React Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./stockpilot-frontend
      dockerfile: Dockerfile
    container_name: stockpilot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data: